<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predictions</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0b1220, #111827);
            color: white;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(0,0,0,0.6);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #22c55e;
            letter-spacing: 1px;
        }

        nav a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
            font-size: 14px;
        }

        nav a:hover {
            color: #22c55e;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            font-size: 34px;
            color: #22c55e;
            margin-bottom: 10px;
        }

        .hero p {
            color: #cbd5e1;
            font-size: 16px;
        }

        /* CONTAINER */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
        }

        /* CARD */
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #22c55e;
        }

        .card h3 {
            font-size: 18px;
            color: #38bdf8;
        }

        .card p {
            font-size: 15px;
            color: #e2e8f0;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            background: rgba(0,0,0,0.6);
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
        }
    </style>

</head>
<body>

<header class="header">
    <div class="logo">SUPRA PREDICTIONS</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="predictions.html">Predictions</a>
    </nav>
</header>

<section class="hero">
    <h1>TODAY'S FOOTBALL PREDICTIONS</h1>
    <p>Daily accurate tips</p>
</section>

<div class="container">

    <div class="card">
        <h3>Arsenal vs Chelsea</h3>
        <p><b>Prediction:</b> Over 2.5 Goals</p>
    </div>

    <div class="card">
        <h3>Real Madrid vs Barcelona</h3>
        <p><b>Prediction:</b> Both Teams Score</p>
    </div>

    <div class="card">
        <h3>Man City vs Liverpool</h3>
        <p><b>Prediction:</b> Man City Win</p>
    </div>

</div>

<footer>
    Telegram: @nas_irrx
</footer>

</body>
</html>
